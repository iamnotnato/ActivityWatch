name: Build Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  PROJECT_NAME: aw-notify

jobs:
  build-linux-x64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev

      - name: Build Release
        run: cargo build --release

      - name: Package
        run: |
          cd target/release
          tar -czf ${{ env.PROJECT_NAME }}-linux-x64.tar.gz ${{ env.PROJECT_NAME }}
          cd -

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-linux-x64
          path: ./target/release/${{ env.PROJECT_NAME }}-linux-x64.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev

      - name: Build Release
        run: cargo build --release

      - name: Package
        run: |
          cd target/release
          tar -czf ${{ env.PROJECT_NAME }}-linux-arm64.tar.gz ${{ env.PROJECT_NAME }}
          cd -

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-linux-arm64
          path: ./target/release/${{ env.PROJECT_NAME }}-linux-arm64.tar.gz

  build-macos-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-apple-darwin
          override: true

      - name: Build Release
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create Application Bundle
        run: |
          mkdir -p ${{ env.PROJECT_NAME }}.app/Contents/MacOS
          mkdir -p ${{ env.PROJECT_NAME }}.app/Contents/Resources

          echo '<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>'${{ env.PROJECT_NAME }}'</string>
            <key>CFBundleIdentifier</key>
            <string>net.activitywatch.'${{ env.PROJECT_NAME }}'</string>
            <key>CFBundleName</key>
            <string>'${{ env.PROJECT_NAME }}'</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.13</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSUIElement</key>
            <true/>
          </dict>
          </plist>' > ${{ env.PROJECT_NAME }}.app/Contents/Info.plist

          cp target/x86_64-apple-darwin/release/${{ env.PROJECT_NAME }} ${{ env.PROJECT_NAME }}.app/Contents/MacOS/

          # Create DMG
          hdiutil create -volname "${{ env.PROJECT_NAME }}" -srcfolder ${{ env.PROJECT_NAME }}.app -ov -format UDZO ${{ env.PROJECT_NAME }}-macos-x64.dmg

          # Create tar.gz as well
          tar -czf ${{ env.PROJECT_NAME }}-macos-x64-app.tar.gz ${{ env.PROJECT_NAME }}.app

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-macos-x64
          path: |
            ./${{ env.PROJECT_NAME }}-macos-x64.dmg
            ./${{ env.PROJECT_NAME }}-macos-x64-app.tar.gz

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-darwin
          override: true

      - name: Build Release
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create Application Bundle
        run: |
          mkdir -p ${{ env.PROJECT_NAME }}.app/Contents/MacOS
          mkdir -p ${{ env.PROJECT_NAME }}.app/Contents/Resources

          echo '<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>'${{ env.PROJECT_NAME }}'</string>
            <key>CFBundleIdentifier</key>
            <string>net.activitywatch.'${{ env.PROJECT_NAME }}'</string>
            <key>CFBundleName</key>
            <string>'${{ env.PROJECT_NAME }}'</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.13</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSUIElement</key>
            <true/>
          </dict>
          </plist>' > ${{ env.PROJECT_NAME }}.app/Contents/Info.plist

          cp target/aarch64-apple-darwin/release/${{ env.PROJECT_NAME }} ${{ env.PROJECT_NAME }}.app/Contents/MacOS/

          # Create DMG
          hdiutil create -volname "${{ env.PROJECT_NAME }}" -srcfolder ${{ env.PROJECT_NAME }}.app -ov -format UDZO ${{ env.PROJECT_NAME }}-macos-arm64.dmg

          # Create tar.gz as well
          tar -czf ${{ env.PROJECT_NAME }}-macos-arm64-app.tar.gz ${{ env.PROJECT_NAME }}.app

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-macos-arm64
          path: |
            ./${{ env.PROJECT_NAME }}-macos-arm64.dmg
            ./${{ env.PROJECT_NAME }}-macos-arm64-app.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build Release
        run: cargo build --release

      - name: Package
        run: |
          cd target/release
          7z a -tzip ${{ env.PROJECT_NAME }}-windows-x64.zip ${{ env.PROJECT_NAME }}.exe
          cd -

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-windows-x64
          path: ./target/release/${{ env.PROJECT_NAME }}-windows-x64.zip

  release:
    name: Create Release
    needs: [build-linux-x64, build-linux-arm64, build-macos-x64, build-macos-arm64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts directory
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            dist/*
